---
# Source: qa-deepseek-vllm/templates/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: qa-deepseek-vllm
  namespace: prod-ecmas
  labels:
    helm.sh/chart: qa-deepseek-vllm-0.0.1
    app: qa-deepseek-vllm
    app.kubernetes.io/version: "0.0.1"
    app.kubernetes.io/managed-by: Helm
data:
  conda.sh: |
    export CONDA_EXE='/opt/conda/bin/conda'
    export _CE_M=''
    export _CE_CONDA=''
    export CONDA_PYTHON_EXE='/opt/conda/bin/python'
  
    # Copyright (C) 2012 Anaconda, Inc
    # SPDX-License-Identifier: BSD-3-Clause
    __conda_exe() (
        "$CONDA_EXE" $_CE_M $_CE_CONDA "$@"
    )
  
    __conda_hashr() {
        if [ -n "${ZSH_VERSION:+x}" ]; then
            \rehash
        elif [ -n "${POSH_VERSION:+x}" ]; then
            :  # pass
        else
            \hash -r
        fi
    }
  
    __conda_activate() {
        if [ -n "${CONDA_PS1_BACKUP:+x}" ]; then
            # Handle transition from shell activated with conda <= 4.3 to a subsequent activation
            # after conda updated to >= 4.4. See issue #6173.
            PS1="$CONDA_PS1_BACKUP"
            \unset CONDA_PS1_BACKUP
        fi
        \local ask_conda
        ask_conda="$(PS1="${PS1:-}" __conda_exe shell.posix "$@")" || \return
        \eval "$ask_conda"
        __conda_hashr
    }
  
    __conda_reactivate() {
        \local ask_conda
        ask_conda="$(PS1="${PS1:-}" __conda_exe shell.posix reactivate)" || \return
        \eval "$ask_conda"
        __conda_hashr
    }
  
    conda() {
        \local cmd="${1-__missing__}"
        case "$cmd" in
            activate|deactivate)
                __conda_activate "$@"
                ;;
            install|update|upgrade|remove|uninstall)
                __conda_exe "$@" || \return
                __conda_reactivate
                ;;
            *)
                __conda_exe "$@"
                ;;
        esac
    }
  
    if [ -z "${CONDA_SHLVL+x}" ]; then
        \export CONDA_SHLVL=0
        # In dev-mode CONDA_EXE is python.exe and on Windows
        # it is in a different relative location to condabin.
        if [ -n "${_CE_CONDA:+x}" ] && [ -n "${WINDIR+x}" ]; then
            PATH="$(\dirname "$CONDA_EXE")/condabin${PATH:+":${PATH}"}"
        else
            PATH="$(\dirname "$(\dirname "$CONDA_EXE")")/condabin${PATH:+":${PATH}"}"
        fi
        \export PATH
  
        # We're not allowing PS1 to be unbound. It must at least be set.
        # However, we're not exporting it, which can cause problems when starting a second shell
        # via a first shell (i.e. starting zsh from bash).
        if [ -z "${PS1+x}" ]; then
            PS1=
        fi
    fi
  start.sh: |
    #!/bin/bash
    source /opt/conda/etc/profile.d/conda.sh
    conda activate vllm
    python -m vllm.entrypoints.openai.api_server \
      --model /data/model/Qwen/Qwen2.5-32B-Instruct \
      --enable-lora \
      --max-loras 8 \
      --max-lora-rank 32 \
      --lora-modules xxxxxx=/data/zhangjiacong/LLamaFactory/lora/lora_32B/multi_turn_rewrite \
      xxxxxx=/data/zhangjiacong/LLamaFactory/lora/lora_32B/slot_extract \
      xxxxxx=/data/zhangjiacong/LLamaFactory/lora/lora_32B/fuzzy_classify \
      xxxxxx=/data/zhangjiacong/LLamaFactory/lora/lora_32B/min_unit_judge \
      xxxxxx=/data/model/sop_stf/qwen32-0414-stf-classify/agent-sop \
      xxxxxx=/data/t2s-data/models_sft/zhong_xin/qwen25_32B_250409_e4_r16/checkpoint-3000 \
      --dtype half \
      --max-model-len 8192 \
      --gpu-memory-utilization 0.95 \
      --trust-remote-code \
      --tensor-parallel-size 4 \
      --port 8111
---
# Source: qa-deepseek-vllm/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: qa-deepseek-vllm
  namespace: prod-ecmas
  labels:
    helm.sh/chart: qa-deepseek-vllm-0.0.1
    app: qa-deepseek-vllm
    app.kubernetes.io/version: "0.0.1"
    app.kubernetes.io/managed-by: Helm
spec:
  type: ClusterIP
  ports:
    - name: tcp
      targetPort: tcp
      protocol: TCP
      port: 8112
  selector:
    app: qa-deepseek-vllm
---
# Source: qa-deepseek-vllm/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: qa-deepseek-vllm-nodeport
  namespace: prod-ecmas
  labels:
    helm.sh/chart: qa-deepseek-vllm-0.0.1
    app: qa-deepseek-vllm
    app.kubernetes.io/version: "0.0.1"
    app.kubernetes.io/managed-by: Helm
spec:
  type: NodePort
  ports:
    - name: tcp
      targetPort: tcp
      protocol: TCP
      port: 8112
      nodePort: 8112
  selector:
    app: qa-deepseek-vllm
---
# Source: qa-deepseek-vllm/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qa-deepseek-vllm
  namespace: prod-ecmas
  labels:
    helm.sh/chart: qa-deepseek-vllm-0.0.1
    app: qa-deepseek-vllm
    app.kubernetes.io/version: "0.0.1"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qa-deepseek-vllm
  template:
    metadata:
      labels:
        app: qa-deepseek-vllm
    spec:
      
      hostNetwork: false
      dnsPolicy: ClusterFirst
      containers:
        - name: qa-deepseek-vllm
          image: xxxxxx/nlp/vllm-openai:v0.6.3.post1
          imagePullPolicy: IfNotPresent
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          envFrom:
            - configMapRef:
                name: common
          args:
            - --model
            - /data/model/deepseek_r1_distill_14B
            - --dtype
            - half
            - --max-model-len
            - "4096"
            - --gpu-memory-utilization
            - "0.8"
            - --trust-remote-code
            - --tensor-parallel-size
            - "2"
            - --port
            - "8112"
          ports:
            - name: tcp
              containerPort: 8112
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: tcp
            initialDelaySeconds: 30
            periodSeconds: 5
        
          readinessProbe:
            httpGet:
              path: /health
              port: tcp
            initialDelaySeconds: 30
            periodSeconds: 5
        
          startupProbe:
            httpGet:
              path: /health
              port: tcp
            initialDelaySeconds: 400
            periodSeconds: 5
        
          resources:
            limits:
              cpu: 32
              memory: 128Gi
              nvidia.com/gpu: 2
            requests:
              cpu: 4
              memory: 16Gi
              nvidia.com/gpu: 2
          volumeMounts:
            - mountPath: /app
              name: start-scripts
            - mountPath: /data/model
              name: base-model
            - mountPath: /data/zhangjiacong/LLaMA-Factory
              name: lora-model
            - mountPath: /dev/shm
              name: dev-shm
      volumes:
        - configMap:
            name: qa-vllm
          name: start-scripts
        - hostPath:
            path: /data/model
            type: Directory
          name: base-model
        - hostPath:
            path: /data/zhangjiacong/LLaMA-Factory
            type: Directory
          name: lora-model
        - emptyDir:
            medium: Memory
            sizeLimit: 128Gi
          name: dev-shm
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: gpu
                operator: Exists
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: qa-deepseek-vllm
                topologyKey: "kubernetes.io/hostname"
      tolerations:
        - effect: NoExecute
          key: gpu
          operator: Exists
