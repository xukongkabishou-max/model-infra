# Source: xinference/templates/deployment-supervisor.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: release-name-xinference-supervisor
  labels:
    helm.sh/chart: xinference-v0.14.0
    app.kubernetes.io/name: xinference
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/version: "v0.14.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: xinference-supervisor
      app.kubernetes.io/name: xinference
      app.kubernetes.io/instance: release-name
  template:
    metadata:
      labels:
        app: xinference-supervisor
        app.kubernetes.io/name: xinference
        app.kubernetes.io/instance: release-name
    spec:
      containers:
      - args:
        - --port
        - "9997"
        - --host
        - 0.0.0.0
        - --log-level
        - debug
        - --auth-config
        - /data/embedding/auth.json
        command:
        - xinference-local
        env:
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: XINFERENCE_POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: XINFERENCE_HOME
          value: /data
        image: "harbor.gpu.ecmasai.com:543/nlp/xinference:v0.14.2"
        imagePullPolicy: IfNotPresent
        name: supervisor
        ports:
          - containerPort: 9997
            name: web
          - containerPort: 9999
            name: oscar
        resources:
          limits:
            cpu: "4"
            memory: 8Gi
            nvidia.com/gpu: 1
        volumeMounts:
          - mountPath: /xinference/models
            name: model-manifests
          - mountPath: /data/embedding
            name: embedding
          - mountPath: /data
            name: xinference-home
      volumes:
        - configMap:
            name: xinference-cm
          name: model-manifests
        - hostPath:
            path: /data/embedding
            type: Directory
          name: embedding
        - name: xinference-home
          persistentVolumeClaim:
            claimName: xinference-shared-volume-claim
---
# Source: xinference/templates/deployment-worker.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: release-name-xinference-worker
  labels:
    helm.sh/chart: xinference-v0.14.0
    app.kubernetes.io/name: xinference
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/version: "v0.14.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: xinference-worker
      app.kubernetes.io/name: xinference
      app.kubernetes.io/instance: release-name
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: xinference-worker
        app.kubernetes.io/name: xinference
        app.kubernetes.io/instance: release-name
    spec:
      initContainers:
      - name: check-supervisor
        image: "harbor.ecmasai.com/middleware/curlimages/curl:8.8.0"
        command:
        - sh
        - -c
        - until curl -v http://service-supervisor:9997/v1/address; do echo waiting for supervisor;
          sleep 1; done
      containers:
      - args:
        - -e
        - http://service-supervisor:9997
        - --host
        - 0.0.0.0
        - --worker-port
        - "30001"
        - --log-level
        - debug
        command:
        - xinference-worker
        env:
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: XINFERENCE_MODEL_SRC
          value: huggingface
        - name: XINFERENCE_HOME
          value: /data
        - name: XINFERENCE_POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        image: "harbor.gpu.ecmasai.com:543/nlp/xinference:v0.14.2"
        imagePullPolicy: IfNotPresent
        name: worker
        ports:
          - containerPort: 30001
        resources:
          requests:
            cpu: "2"
            memory: 8Gi
          limits:
            nvidia.com/gpu: "1"
        volumeMounts:
          - mountPath: /xinference/models
            name: model-manifests
          - mountPath: /data/embedding
            name: embedding
          - mountPath: /data
            name: xinference-home
      volumes:
        - configMap:
            name: xinference-cm
          name: model-manifests
        - hostPath:
            path: /data/embedding
            type: Directory
          name: embedding
        - name: xinference-home
          persistentVolumeClaim:
            claimName: xinference-shared-volume-claim
