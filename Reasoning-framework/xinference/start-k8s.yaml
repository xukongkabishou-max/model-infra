---
# Source: xinference/templates/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: xinference-cm
  namespace: dev-ecmas
  labels:
    helm.sh/chart: xinference-v0.14.0
    app.kubernetes.io/name: xinference
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/version: "v0.14.0"
    app.kubernetes.io/managed-by: Helm
data:
  bce-base-embedding.json: |
    {
        "model_name": "bce-embedding-base",
        "dimensions": 768,
        "max_tokens": 512,
        "language": ["zh"],
        "model_uri": "/data/embedding/bce-embedding-base_v1"
    }
  bce-base-reranker.json: |
    {
        "model_name": "bce-reranker-base",
        "type": "normal",
        "language": ["en", "zh", "multilingual"],
        "model_uri": "/data/embedding/bce-reranker-base_v1"
    }
  bge-base-embedding-sql.json: |
    {
        "model_name": "bge-embedding-base-sql",
        "dimensions": 768,
        "max_tokens": 512,
        "language": ["zh"],
        "model_uri": "/data/embedding/bge-embedding-sql-base_v1.1"
    }
  bge-reranker-base-sql.json: |
    {
        "model_name": "bge-reranker-base-sql",
        "type": "normal",
        "language": ["en", "zh", "multilingual"],
        "model_uri": "/data/embedding/bge-reranker-sql-base_v1.1"
    }
  register-launch.sh: |
    #!/bin/bash
    set -xu
    cd $(dirname $0)
    # 等待 xinference 启动
    # sleep 10
    # until curl -sf localhost:9997; do echo "wait xinference start"; sleep 1; done
    # 注册模型
    xinference register --model-type embedding  --file bce-base-embedding.json --persist -e http://service-supervisor:9997 --api-key sk-dsGsBnxa6xsql
    xinference register --model-type embedding  --file bge-base-embedding-sql.json --persist -e http://service-supervisor:9997 --api-key sk-dsGsBnxa6xsql
    xinference register --model-type embedding  --file sop-bge-base-embedding.json --persist -e http://service-supervisor:9997 --api-key sk-dsGsBnxa6xsql
    xinference register --model-type rerank --file bce-base-reranker.json --persist -e http://service-supervisor:9997 --api-key sk-dsGsBnxa6xsql
    xinference register --model-type rerank --file bge-reranker-base-sql.json --persist -e http://service-supervisor:9997 --api-key sk-dsGsBnxa6xsql
    xinference register --model-type rerank --file sop-bge-base-rerank.json --persist -e http://service-supervisor:9997 --api-key sk-dsGsBnxa6xsql
    # 启动模型
    xinference launch --replica 1 --model-name bge-embedding-base-sql --model-type embedding -e http://service-supervisor:9997 --gpu-idx 0 --api-key sk-dsGsBnxa6xsql
    xinference launch --replica 1 --model-name bge-reranker-base-sql --model-type rerank -e http://service-supervisor:9997 --gpu-idx 0 --api-key sk-dsGsBnxa6xsql
    xinference launch --replica 1 --model-name bce-embedding-base --model-type embedding -e http://service-supervisor:9997 --gpu-idx 0 --api-key sk-dsGsBnxa6xsql
    xinference launch --replica 1 --model-name bce-reranker-base --model-type rerank -e http://service-supervisor:9997 --gpu-idx 0 --api-key sk-dsGsBnxa6xsql
    xinference launch --replica 1 --model-name sop-bge-base --model-type embedding -e http://service-supervisor:9997 --gpu-idx 0 --api-key sk-dsGsBnxa6xsql
    xinference launch --replica 1 --model-name sop-bge-base-rerank --model-type rerank -e http://service-supervisor:9997 --gpu-idx 0 --api-key sk-dsGsBnxa6xsql
  sop-bge-base-embedding.json: |
    {
        "model_name": "sop-bge-base",
        "dimensions": 768,
        "max_tokens": 512,
        "language": ["zh"],
        "model_uri": "/data/embedding/sop-bge-base-wrl-1008"
    }
  sop-bge-base-rerank.json: |
    {
        "model_name": "sop-bge-base-rerank",
        "language": ["zh"],
        "model_uri": "/data/embedding/sop-bge-base-rerank-wrl-1011"
    }
  unregister.sh: |
    set -exu
    cd $(dirname $0)
    # 等待 xinference 启动
    # sleep 10
    # until curl -sf localhost:9997; do echo "wait xinference start"; sleep 1; done
    xinference unregister --model-type embedding -e http://service-supervisor:9997 --model-name bce-embedding-base --api-key sk-dsGsBnxa6xsql
    xinference unregister --model-type embedding -e http://service-supervisor:9997 --model-name bge-embedding-base-sql --api-key sk-dsGsBnxa6xsql
    xinference unregister --model-type embedding -e http://service-supervisor:9997 --model-name sop-bge-base --api-key sk-dsGsBnxa6xsql
    xinference unregister --model-type rerank -e http://service-supervisor:9997 --model-name bce-reranker-base --api-key sk-dsGsBnxa6xsql
    xinference unregister --model-type rerank -e http://service-supervisor:9997 --model-name bge-reranker-base-sql --api-key sk-dsGsBnxa6xsql
    xinference unregister --model-type rerank -e http://service-supervisor:9997 --model-name sop-bge-base-rerank --api-key sk-dsGsBnxa6xsql
---
