apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-rerank
  namespace: prod-ecmas
  labels:
    app: vllm-rerank
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: vllm-rerank
  template:
    metadata:
      labels:
        app: vllm-rerank
    spec:
      schedulerName: metax-gpu-scheduler
      runtimeClassName: metax
      hostNetwork: false
      dnsPolicy: ClusterFirst
      enableServiceLinks: false
      containers:
        - name: vllm-rerank
          image: cr.metax-tech.com/public-ai-release/maca/vllm-metax:0.20.0-maca.ai3.7.0.107-torch2.8-py310-kylinv11-amd64
          imagePullPolicy: IfNotPresent
          command:
            - /opt/conda/bin/python3
            - -m
            - vllm.entrypoints.openai.api_server
          args:
            - --model
            - /base-rerank-model
            - --runner
            - pooling
            - --convert
            - classify
            - --served-model-name
            - bce-reranker-base_v1
            - --port
            - "9998"
            - --dtype
            - auto
            - --max-model-len
            - "512"
            - --gpu-memory-utilization
            - "0.60"
            - --trust-remote-code
            - --tensor-parallel-size
            - "1"
            - --max-num-seqs
            - "16"
            - --enforce-eager
            - --seed
            - "0"
          ports:
            - name: http
              containerPort: 9998
              protocol: TCP
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 360
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            limits:
              cpu: 8
              memory: 48Gi
              metax-tech.com/sgpu: "1"
              metax-tech.com/vcore: "50"
              metax-tech.com/vmemory: "32"
            requests:
              cpu: 2
              memory: 32Gi
              metax-tech.com/sgpu: "1"
              metax-tech.com/vcore: "50"
              metax-tech.com/vmemory: "32"
          volumeMounts:
            - name: base-rerank-model
              mountPath: /base-rerank-model
              readOnly: true
      volumes:
        - name: base-rerank-model
          hostPath:
            path: /data/rerank/bce-reranker-base_v1
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-rerank
  namespace: prod-ecmas
  labels:
    app: vllm-rerank
spec:
  type: NodePort
  selector:
    app: vllm-rerank
  ports:
    - name: http
      protocol: TCP
      port: 9998
      targetPort: http
      nodePort: 9998
