---
# Source: mineru-sglang/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: mineru-sglang
  namespace: prod-ecmas
  labels:
    helm.sh/chart: mineru-sglang-0.0.1
    app: mineru-sglang
    app.kubernetes.io/version: "0.0.1"
    app.kubernetes.io/managed-by: Helm
spec:
  type: NodePort
  selector:
    app: mineru-sglang
  ports:
    - name: tcp
      port: 16543
      targetPort: 16543
      protocol: TCP
      nodePort: 16543
---
# Source: mineru-sglang/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mineru-sglang
  namespace: prod-ecmas
  labels:
    app: mineru-sglang
    helm.sh/chart: mineru-sglang-0.0.1
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: 0.0.1
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: mineru-sglang
  template:
    metadata:
      labels:
        app: mineru-sglang
    spec:
      schedulerName: metax-gpu-scheduler
      runtimeClassName: metax
      enableServiceLinks: false
      hostname: mineru-host
      tolerations:
        - effect: NoSchedule
          key: node.kubernetes.io/memory-pressure
          operator: Exists
      containers:
        - name: mineru-sglang
          image: "mineru:maca-vllm-rag-compatible-v20260612-1835"
          imagePullPolicy: IfNotPresent
          workingDir: /workspace
          ports:
            - containerPort: 16543
              name: tcp
              protocol: TCP
          env:
            - name: LANG
              value: "en_US.UTF-8"
            - name: MINERU_MODEL_SOURCE
              value: "local"
            - name: MINERU_LMDEPLOY_DEVICE
              value: "maca"
            - name: MINERU_VLLM_DEVICE
              value: "maca"
            - name: MINERU_TOOLS_CONFIG_JSON
              value: "/root/mineru.json"
            - name: MINERU_API_OUTPUT_ROOT
              value: "/workspace/mineru-output"
            - name: MINERU_API_MAX_CONCURRENT_REQUESTS
              value: "1"
          volumeMounts:
            - mountPath: /root/.cache/modelscope
              name: modelscope-cache
            - mountPath: /root/mineru.json
              name: mineru-config
              readOnly: true
            - mountPath: /workspace/mineru-output
              name: mineru-output
          resources:
            limits:
              cpu: 8
              memory: 96Gi
              metax-tech.com/sgpu: "1"
              metax-tech.com/vcore: "50"
              metax-tech.com/vmemory: "32"
            requests:
              cpu: 4
              memory: 48Gi
              metax-tech.com/sgpu: "1"
              metax-tech.com/vcore: "50"
              metax-tech.com/vmemory: "32"
          livenessProbe:
            httpGet:
              path: /health_generate
              port: 16543
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          readinessProbe:
            httpGet:
              path: /health_generate
              port: 16543
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          startupProbe:
            httpGet:
              path: /health_generate
              port: 16543
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 720
            successThreshold: 1
      volumes:
        - hostPath:
            path: /data/model/modelscope-cache
            type: Directory
          name: modelscope-cache
        - hostPath:
            path: /data/model/mineru.json
            type: File
          name: mineru-config
        - hostPath:
            path: /data/model/mineru-output-k8s
            type: DirectoryOrCreate
          name: mineru-output
